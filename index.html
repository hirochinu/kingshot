<html lang="ja">
<head>

<style>
:root{
  --primary:#007aff;
  --primary-light:rgba(0,122,255,.06);
  --primary-ultra-light:rgba(0,122,255,.04);
  --primary-outline:rgba(0,122,255,.3);
  --primary-shadow:rgba(0,122,255,.13);
  --primary-shadow-light:rgba(0,122,255,.08);
  --bg-secondary:#f2f2f7;
  --bg-card:rgba(255,255,255,.88);
  --bg-card-light:rgba(255,255,255,.92);
  --text-primary:#000;
  --text-secondary:#6e6e73;
  --text-tertiary:#8e8e93;
  --text-muted:rgba(60,60,67,.18);
  --radius-lg:16px;
  --radius-md:14px;
  --radius-sm:12px;
  --radius-xs:10px;
  --shadow-sm:0 2px 10px rgba(0,0,0,.06);
  --shadow-md:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 4px 20px var(--primary-shadow);
  --spacing-xs:4px;
  --spacing-sm:8px;
  --spacing-md:12px;
  --spacing-lg:16px;
  --spacing-xl:20px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg-secondary);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased
}

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]:focus{outline:none}

.wrap{padding:var(--spacing-lg);max-width:520px;margin:0 auto}

.card,.card-hi{
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:var(--radius-lg);
  padding:var(--spacing-lg) var(--spacing-xl);
  margin-bottom:var(--spacing-sm);
  overflow:hidden
}

.card{box-shadow:var(--shadow-md),0 1px 3px rgba(0,0,0,.04)}

.card-hi{
  background:var(--bg-card-light);
  box-shadow:var(--shadow-lg),0 1px 4px var(--primary-shadow-light);
  outline:1.5px solid var(--primary-outline)
}

.sec{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.04em;margin-bottom:10px}
.fl{font-size:12px;color:var(--text-secondary);margin-bottom:4px}

.iw{
  display:flex;
  align-items:center;
  background:rgba(118,118,128,.12);
  border-radius:var(--radius-xs);
  overflow:hidden
}

.iw:focus-within{outline:2px solid var(--primary);background:var(--primary-light)}

.iw input{
  flex:1;
  border:none;
  background:none;
  padding:10px var(--spacing-md);
  font-size:15px;
  font-weight:500;
  color:var(--text-primary);
  outline:none;
  font-family:inherit;
  min-width:0
}

.iw .sfx{font-size:13px;color:var(--text-tertiary);padding:0 var(--spacing-md) 0 0;white-space:nowrap}

.btn{
  width:100%;
  padding:14px 0;
  border-radius:var(--radius-md);
  background:var(--primary);
  border:none;
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  font-family:inherit;
  margin-top:var(--spacing-md);
  box-shadow:0 4px 14px rgba(0,122,255,.32)
}

.btn-gray{background:var(--text-tertiary);box-shadow:none}

.menu-btn{
  padding:18px var(--spacing-xl);
  border-radius:var(--radius-lg);
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  font-family:inherit;
  text-align:left;
  display:flex;
  align-items:center;
  gap:var(--spacing-md);
  width:100%;
  border:none
}

.paste-box{
  width:100%;
  min-height:96px;
  padding:var(--spacing-md);
  border:2px dashed var(--primary-outline);
  border-radius:var(--radius-sm);
  font-size:13px;
  font-family:inherit;
  color:var(--text-primary);
  background:var(--primary-ultra-light);
  resize:vertical;
  outline:none;
  line-height:1.7
}

.paste-box:focus{outline:2px solid var(--primary)}
.paste-box::placeholder{color:var(--text-tertiary)}

.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--spacing-sm);margin-top:10px}
.preview-cell{text-align:center;padding:10px var(--spacing-xs);border-radius:var(--radius-sm)}
.preview-val{font-size:18px;font-weight:700;line-height:1}
.preview-lbl{font-size:10px;margin-top:3px}

.guide-step{
  display:flex;
  gap:var(--spacing-md);
  align-items:flex-start;
  padding:10px 0;
  border-bottom:.5px solid var(--text-muted)
}

.guide-step:last-child{border-bottom:none}

.guide-num{
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--primary);
  color:#fff;
  font-size:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  margin-top:1px
}

.guide-text{font-size:13px;color:var(--text-primary);line-height:1.5;font-weight:500}
.guide-sub{font-size:12px;color:var(--text-tertiary);margin-top:2px}

.toast{border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:var(--spacing-sm);margin-top:var(--spacing-md)}
.toast-ok{background:rgba(52,199,89,.15);color:#1a7a33}
.toast-err{background:rgba(255,59,48,.12);color:#c0392b}
.toast-warn{background:rgba(255,149,0,.12);color:#9a5f00}

.list-group{
  border-radius:var(--radius-md);
  overflow:hidden;
  margin-bottom:var(--spacing-sm);
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-sm)
}

.dropdown-wrap{position:relative;margin-bottom:var(--spacing-sm)}

.dropdown{
  width:100%;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:none;
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-sm);
  padding:14px 42px 14px var(--spacing-lg);
  font-size:15px;
  font-weight:600;
  color:var(--text-primary);
  font-family:inherit;
  cursor:pointer;
  outline:none;
  transition:box-shadow .15s ease,background .15s ease;
  text-overflow:ellipsis
}

.dropdown:hover{box-shadow:var(--shadow-md),0 1px 3px rgba(0,0,0,.04)}
.dropdown:focus{outline:none;background:var(--primary-light);box-shadow:0 0 0 2px var(--primary)}
.dropdown:active{background:rgba(0,0,0,.03)}

.dropdown-wrap::after{
  content:"";
  position:absolute;
  right:19px;
  top:50%;
  width:8px;
  height:8px;
  border-right:2px solid var(--text-tertiary);
  border-bottom:2px solid var(--text-tertiary);
  transform:translateY(-65%) rotate(45deg);
  pointer-events:none;
  transition:border-color .15s ease
}

.dropdown-wrap:focus-within::after{border-color:var(--primary)}

.dropdown-hint{font-size:12px;color:var(--text-tertiary);margin:6px 2px 0}

.list-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:13px var(--spacing-lg);
  border-bottom:.5px solid rgba(60,60,67,.12);
  cursor:pointer;
  transition:background .1s
}

.list-row:last-child{border-bottom:none}
.list-row:active{background:rgba(0,0,0,.05)}
.list-row.on{background:var(--primary-light)}

.accordion-toggle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:11px 13px;
  border-radius:10px;
  background:rgba(255,255,255,.6);
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  cursor:pointer;
  transition:background .12s ease,box-shadow .12s ease;
  -webkit-tap-highlight-color:transparent;
}
.accordion-toggle:hover{background:rgba(255,255,255,.9)}
.accordion-toggle:active{background:rgba(0,0,0,.04);box-shadow:none}
.accordion-chevron{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(118,118,128,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:#8e8e93;
  flex-shrink:0;
  transition:transform .15s ease;
}

.sep{height:.5px;background:var(--text-muted);margin:14px 0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.step-content{animation:fadeIn 1.2s ease-in;padding-top:var(--spacing-lg)}

/* Layout Classes */
.flex-row{display:flex;align-items:center;gap:var(--spacing-md)}
.flex-col{display:flex;flex-direction:column;gap:var(--spacing-md)}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-center{display:flex;align-items:center;justify-content:center}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--spacing-sm)}

/* Spacing Classes */
.mb-xs{margin-bottom:var(--spacing-xs)}
.mb-sm{margin-bottom:var(--spacing-sm)}
.mb-md{margin-bottom:var(--spacing-md)}
.mb-lg{margin-bottom:var(--spacing-lg)}
.mt-md{margin-top:var(--spacing-md)}
.mt-lg{margin-top:var(--spacing-lg)}

/* Text Classes */
.text-body{font-size:15px;font-weight:500;color:var(--text-primary)}
.text-label{font-size:12px;font-weight:600;color:var(--text-secondary)}
.text-sub{font-size:13px;color:var(--text-tertiary)}
.text-bold{font-weight:600}
.text-muted{color:var(--text-tertiary)}

/* Size Classes */
.w-full{width:100%}
.radius-sm{border-radius:var(--radius-sm)}
.radius-md{border-radius:var(--radius-md)}

/* Shrink */
.flex-shrink-0{flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
// マウスホイールで数値が変わるのを防ぐ
document.addEventListener("wheel",function(e){

var h=React.createElement,useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect;
var IC={inf:"#ff9500",cav:"#af52de",arc:"#007aff"};
var IB={inf:"rgba(255,149,0,.12)",cav:"rgba(175,82,222,.12)",arc:"rgba(0,122,255,.12)"};
var TIERS=[
  {v:"t1t6",l:"兵士lv1〜6",b:1.10},
  {v:"t7tg2",l:"兵士lv7〜黄金2",b:1.21},
  {v:"tg3tg4",l:"黄金3〜4",b:1.21},

];

  {lv:1,label:"遠征：ゴールデン・リズム Lv.1",sub:"弓兵ATK +6%",b:6},
  {lv:2,label:"遠征：ゴールデン・リズム Lv.2",sub:"弓兵ATK +12%",b:12},
  {lv:3,label:"遠征：ゴールデン・リズム Lv.3",sub:"弓兵ATK +18%",b:18},
  {lv:4,label:"遠征：ゴールデン・リズム Lv.4",sub:"弓兵ATK +24%",b:24},
  {lv:5,label:"遠征：ゴールデン・リズム Lv.5",sub:"弓兵ATK +30%",b:30}
];
var ML=["自集結","行軍①","行軍②","行軍③","行軍④","行軍⑤","行軍⑥"];

function calcW(a,l,c){return (1+a/100)*(1+l/100)*c;}
function findOpt(wI,wC,wA){
  var tot=wI*wI+wC*wC+wA*wA;
  if(!tot) return {inf:34,cav:33,arc:33};
  var fi=wI*wI/tot*100,fc=wC*wC/tot*100,fa=wA*wA/tot*100;
  var inf=Math.round(fi),cav=Math.round(fc),arc=Math.round(fa);
  var diff=100-(inf+cav+arc);
  if(diff!==0){
    var fr=[{k:"inf",f:fi-inf},{k:"cav",f:fc-cav},{k:"arc",f:fa-arc}];
    fr.sort(function(a,b){return diff>0?b.f-a.f:a.f-b.f;});
    if(fr[0].k==="inf")inf+=diff; else if(fr[0].k==="cav")cav+=diff; else arc+=diff;
  }
  inf=Math.max(0,inf);cav=Math.max(0,cav);arc=Math.max(0,arc);
  if(inf<0){arc+=inf;inf=0;} if(cav<0){arc+=cav;cav=0;} if(arc<0){inf+=arc;arc=0;}
  return {inf:inf,cav:cav,arc:arc};
}


function parseKeyValues(txt,keys){
  if(!txt)return {};var result={};var lines=(txt||"").split("\n");
  lines.forEach(function(line){
    var parts=line.split(/[:\s]+/);
    if(parts.length>=2){
      keys.forEach(function(k){
        if(parts[0].includes(k.label)){result[k.key]=parseFloat(parts[1]);}
      });
    }
  });
  return result;
}

function parseBonus(txt){
  var res={};
  var km={"歩兵攻撃力":"infAtk","歩兵攻擊力":"infAtk","歩兵殺傷力":"infLet","騎兵攻撃力":"cavAtk","騎兵攻擊力":"cavAtk","騎兵殺傷力":"cavLet","弓兵攻撃力":"arcAtk","弓兵攻擊力":"arcAtk","弓兵殺傷力":"arcLet"};
  var pt=[{key:"歼兵攻",f:"infAtk"},{key:"歼兵殺",f:"infLet"},{key:"步兵攻",f:"infAtk"},{key:"步兵殺",f:"infLet"},{key:"歩兵攻",f:"infAtk"},{key:"歩兵殺",f:"infLet"},{key:"騎兵攻",f:"cavAtk"},{key:"騎兵殺",f:"cavLet"},{key:"弓兵攻",f:"arcAtk"},{key:"弓兵殺",f:"arcLet"}];
  var lines=txt.split(/[\n\r]+/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  for(var i=0;i<lines.length;i++){
    var line=lines[i],field=km[line];
    if(field&&res[field]==null&&i>0){var m=lines[i-1].match(/\d+\.?\d*/);if(m){res[field]=parseFloat(m[0]);}}
    if(!field){pt.forEach(function(p){if(line.indexOf(p.key)!==-1&&res[p.f]==null&&i>0){var m=lines[i-1].match(/\d+\.?\d*/);if(m){res[p.f]=parseFloat(m[0]);}}});}
  }
  return res;
}

function parseTroops(txt){
  var res={};
  var km=[
    {k:"切り札弓兵",f:"arc"},{k:"切り札会兵",f:"arc"},{k:"切り札歩兵",f:"inf"},{k:"切り札騎兵",f:"cav"},
    {k:"切 札弓兵",f:"arc"},{k:"切 札会兵",f:"arc"},{k:"切 札歩兵",f:"inf"},{k:"切 札騎兵",f:"cav"},
    {k:"弓兵",f:"arc"},{k:"騎兵",f:"cav"},{k:"歩兵",f:"inf"}
  ];
  var lines=txt.split(/\n|\r/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    for(var j=0;j<km.length;j++){
      var key=km[j].k,fld=km[j].f;
      if(line.indexOf(key)!==-1&&res[fld]==null){
        if(i+1<lines.length){var m=lines[i+1].match(/[\d,]+/);if(m){res[fld]=parseInt(m[0].replace(/,/g,""));break;}}
        var m2=line.replace(key,"").match(/[\d,]+/);
        if(m2) res[fld]=parseInt(m2[0].replace(/,/g,""));
        break;
      }
    }
  }
  return res;
}

function fmt(n){return Math.round(Math.abs(n)).toLocaleString();}

function GuideAccordion(props){
  var label=props.label,steps=props.steps,color=props.color||"#007aff";
  var so=React.useState(false);var open=so[0],setOpen=so[1];
  return h("div",{style:{marginBottom:8}},
    h("div",{onClick:function(){setOpen(!open);},className:"accordion-toggle"},
      h("div",{className:"flex-row"},
        h("div",{style:{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}),
        h("span",{style:{fontSize:13,fontWeight:600,color:"#000"}},label)
      ),
      h("span",{className:"accordion-chevron",style:{transform:open?"rotate(180deg)":"none"}},"▼")
    ),
    open&&h("div",{style:{background:"rgba(118,118,128,.06)",borderRadius:"0 0 12px 12px",padding:"10px 14px"}},
      steps.map(function(g){
        return h("div",{key:g.n,className:"guide-step"},
          h("div",{className:"guide-num",style:{background:color}},g.n),
          h("div",null,
            h("div",{className:"guide-text"},g.t),
            g.s&&h("div",{className:"guide-sub"},g.s),
            g.link&&h("a",{href:g.link.href,target:"_blank",rel:"noopener"},g.link.label+" →")
          )
        );
      })
    )
  );
}

function Stepper(props){
  var step=props.step,labels=props.labels;
  return h("div",{style:{display:"flex",alignItems:"flex-start",marginBottom:16}},
    labels.map(function(lb,i){
      var done=i<step,active=i===step,isLast=i===labels.length-1;

        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}},
          h("div",{style:{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:done?"#007aff":active?"rgba(0,122,255,.15)":"rgba(118,118,128,.15)",color:done?"#fff":active?"#007aff":"#8e8e93",boxShadow:done?"0 2px 8px rgba(0,122,255,.35)":"none",cursor:i<=step?"pointer":"default"},onClick:i<=step?function(){props.setStep(i);}:null},done?"✓":String(i+1)),
          h("div",{style:{fontSize:10,color:active?"#007aff":"#8e8e93",fontWeight:active?600:400,whiteSpace:"nowrap"}},lb)

        {n:2,t:"ボーナス詳細画面のスクショを撮る",s:""},
        {n:3,t:"Googleレンズでスクショを読み取る",s:"",link:{href:"https://lens.google.com",label:"Googleレンズを開く"}},
        {n:4,t:"「テキスト」タブ →「すべてを選択」→「コピー」",s:"画面内の文字がすべて選択されます"},
        {n:5,t:"下のエリアに貼り付け",s:"自動でステータスを読み取ります"}
      ]})
    ),
        h("textarea",{className:"paste-box",value:txt,placeholder:"👆 ここに貼り付け",onChange:function(e){handle(e.target.value);}}),
    result&&result.found>0&&h("div",null,

function ToolJoiner(props){
  var onBack=props.onBack;

  var soI=useState(""),soC=useState(""),soA=useState("");
  var oI=soI[0],setOI=soI[1],oC=soC[0],setOC=soC[1],oA=soA[0],setOA=soA[1];
  var sm=useState(1),smz=useState(["","","","","","",""]);
  var sip=useState(["","","","","","",""]),scp=useState(["","","","","","",""]);
  var march=sm[0],setMarch=sm[1],mSz=smz[0],setMSz=smz[1];
  var mIP=sip[0],setMIP=sip[1],mCP=scp[0],setMCP=scp[1];
  var smode=useState("even");var mode=smode[0],setMode=smode[1];
  var svl=useState(0);var villaLv=svl[0],setVillaLv=svl[1];
  var spet=useState(0);var petLv=spet[0],setPetLv=spet[1];
  var nI=parseInt(oI)||0,nC=parseInt(oC)||0,nA=parseInt(oA)||0;

  function applyTroops(p){
    if(p.inf!=null)setOI(String(p.inf));
    if(p.cav!=null)setOC(String(p.cav));
    if(p.arc!=null)setOA(String(p.arc));
  }

  var RAGING_BEAST_BONUSES=[0,1500,3000,4500,6000,7500,9000,10500,12000,13500,15000];
  var calcResult=useMemo(function(){
    if(!nI&&!nC&&!nA) return null;
    var villaBon=villaLv*3000;
    var petBon=RAGING_BEAST_BONUSES[petLv]||0;
    var caps=[];
    for(var i=0;i<march;i++) caps.push((parseInt(mSz[i])||0)+villaBon+petBon);
    if(caps.every(function(c){return !c;})) return null;
    var ratios=[];
    for(var i=0;i<march;i++){
      var pI=Math.min(100,Math.max(0,parseInt(mIP[i])||0));
      var pC=Math.min(100,Math.max(0,parseInt(mCP[i])||0));
      ratios.push({inf:pI,cav:pC,arc:Math.max(0,100-pI-pC)});
    }
    var left={inf:nI,cav:nC,arc:nA};
    var results=[];
    if(mode==="none"){
      for(var i=0;i<march;i++){
        var cap=caps[i];
        if(!cap){results.push(null);continue;}
        var iN=Math.round(cap*ratios[i].inf/100);
        var cN=Math.round(cap*ratios[i].cav/100);
        var aN=Math.max(0,cap-iN-cN);
        results.push({inf:iN,cav:cN,arc:aN,total:iN+cN+aN,cap:cap});
        left.inf-=iN;left.cav-=cN;left.arc-=aN;
      }
    } else if(mode==="even"){
      var n=march;
      for(var i=0;i<march;i++){
        var cap=caps[i];
        if(!cap){results.push(null);n--;continue;}
        var iN=Math.min(Math.round(cap*ratios[i].inf/100),Math.floor(left.inf/Math.max(n,1)));
        var cN=Math.min(Math.round(cap*ratios[i].cav/100),Math.floor(left.cav/Math.max(n,1)));
        var aN=Math.min(Math.round(cap*ratios[i].arc/100),Math.floor(left.arc/Math.max(n,1)));
        results.push({inf:iN,cav:cN,arc:aN,total:iN+cN+aN,cap:cap});
        left.inf-=iN;left.cav-=cN;left.arc-=aN;n--;
      }
    } else {
      // 偏り配分：行軍0から順に出征容量いっぱいまで全力投入
      // 兵種ごとに保有数が尽きたら以降の行軍は0
      for(var i=0;i<march;i++){
        var cap=caps[i];
        if(!cap){results.push(null);continue;}
        // この行軍に入れたい数（比率×容量）と残保有数の小さい方
        var iN=Math.min(Math.round(cap*ratios[i].inf/100),Math.max(0,left.inf));
        var cN=Math.min(Math.round(cap*ratios[i].cav/100),Math.max(0,left.cav));
        var aN=Math.min(Math.round(cap*ratios[i].arc/100),Math.max(0,left.arc));
        results.push({inf:iN,cav:cN,arc:aN,total:iN+cN+aN,cap:cap});
        left.inf-=iN;left.cav-=cN;left.arc-=aN;
      }
    }
    return {results:results,left:left};
  },[nI,nC,nA,march,mSz,mIP,mCP,mode,villaLv,petLv]);

  return h("div",{style:{paddingBottom:80}},

// 確定済みの数値のみ自動加算。未検証の英雄は選択できるが数値には反映せず注記のみ表示する。
function pvpSideBonus(side){
  var atkAdd=0,letAdd=0,heaAdd=0,defAdd=0,armyMult=1,notes=[],rosaArcBonus=0;
  function unconf(label){notes.push({t:label,s:"⚠️ 数値未検証のため計算には反映されていません",warn:true});}

  if(side.heroInf==="charles"){
    defAdd+=40;
    notes.push({t:"チャールズ（歩兵ホスト）",s:"防御系+40%相当（「パンツァーオーラ」敵殺傷力-20%＋「鋼鉄の身体」被ダメ-20%・いずれも無条件常時）。「愛と正義」総HP25%回復は回復系のため未反映"});
  } else if(side.heroInf==="amadeus"){
    letAdd+=25;atkAdd+=25;
    notes.push({t:"アマデウス（歩兵ホスト）",s:"殺傷力+25%・攻撃力+25%（遠征スキル「臨戦態勢」「剣術指導」最大値。「不義の一撃」＝40%確率で与ダメ+50%は確率依存のため未反映）"});
  } else if(side.heroInf==="eric"){
    defAdd+=40;heaAdd+=25;
    notes.push({t:"エリック（歩兵ホスト）",s:"被ダメ減+40%相当（「浄化」敵ATK-20%＋「意志」被ダメ-20%）・HP+25%（「鼓舞」）（いずれも無条件常時）"});
  } else if(side.heroInf==="longfei"){
    defAdd+=25;
    notes.push({t:"龍飛（歩兵ホスト）",s:"防御力+25%（「剛筋頑健」・無条件常時。「天昇豪胆」被ダメ-50%＝40%確率、「杯投烈脚」追加ダメ200%＝25%確率は未反映）"});
  } else if(side.heroInf==="howard"){

function pvpTypeFactor(side,bonus,t){
  var atk=(parseFloat(side[t+"_atk"])||0)+bonus.atkAdd;
  if(t==="arc"&&bonus.rosaArcBonus) atk=atk*(1+bonus.rosaArcBonus/100);
  var let_=(parseFloat(side[t+"_let"])||0)+bonus.letAdd;
  var def=(parseFloat(side[t+"_def"])||0)+bonus.defAdd;
  var hea=(parseFloat(side[t+"_hea"])||0)+bonus.heaAdd;
  var A=(1+atk/100)*(1+let_/100)*bonus.armyMult;
  var D=(1+def/100)*(1+hea/100);
  return {A:A,D:D};
}

  if(isNaN(n)) return "10";
  if(n<=6) return "6";
  if(n>=10.5) return "10.5";
  // 最も近い既知ティアに丸める
  var keys=Object.keys(PVP_TIER_SCALE),best="10",bd=99;
  keys.forEach(function(k){var d=Math.abs(parseFloat(k)-n);if(d<bd){bd=d;best=k;}});
  return best;
}
// 兵種tの基礎Atk/HP（ティア別）。inf.atkを基準に比率で導出
function pvpBaseFor(t,tierKey){
  var base=PVP_TIER_SCALE[tierKey]||472;
  if(t==="inf") return {atk:base,hea:base*3};
  if(t==="cav") return {atk:base*3,hea:base};
  return {atk:base*4,hea:base*0.75}; // arc
}
// T1-6は三すくみの追加ボーナス（歩の対騎防御・弓の連続攻撃・騎の奇襲）が無く与ダメ+10%のみ（運営回答）
function pvpTierIsHigh(tierKey){return parseFloat(tierKey)>=7;}
var PVP_TRI_IC=1.30;     // 歩兵→騎兵の実効ボーナス（実測校正値）
var PVP_TRI_AI=1.25;     // 弓兵→歩兵の実効ボーナス（実測34ケースで再校正、2026-07-11夜）
var PVP_TRI_WEAK=1.0;    // 騎兵→弓兵（実測上ボーナスは観測されないため1.0）
var PVP_TRI_BYPASS=0.20; // 騎兵の「奇襲」＝攻撃の20%が歩兵を避けて弓兵へ向かう（Tier7-10）
                         // 重要：奇襲は「騎兵全体の攻撃力×20%」（時間の20%だけ全騎兵が奇襲する期待値）。
                         // 「騎兵の20%が独立部隊として攻撃」(sqrt(0.2n))ではない。後者だとsqrtスケールで
                         // 奇襲火力が過大になり、弓ゼロ構成が過大評価される（実測60/40/0vs40/30/30=6.5%を再現不可）
var PVP_CAV_INF=0.80;    // 騎兵→歩兵は歩兵の対騎兵防御ボーナスで実効-20%（実測34ケースで再校正）
var PVP_SIM_STEPS=250;   // 1試行あたりの最大ステップ数（殲滅で早期終了）
var PVP_MC_TRIALS=1200;  // モンテカルロ試行回数（±1.4pt程度の自前サンプリング誤差。600→1200で√2倍精密化）
var PVP_MC_SIGMA=0.05;   // 陣営実効戦力の対数正規ノイズσ

// 決定論的乱数（mulberry32）：毎回同じ結果を返すためシード固定
function pvpMulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

// opts（省略可）: {trials:試行回数, sigma:ノイズσ}
// 通常表示はデフォルト（PVP_MC_TRIALS回・σ=PVP_MC_SIGMA）、構成スイープの順位付けは{trials:1,sigma:0}の軽量モードを使う
function pvpSimulateBattle(self,opp,bs,bo,opts){
  var mcTrials=(opts&&opts.trials)||PVP_MC_TRIALS;
  var mcSigma=(opts&&typeof opts.sigma==="number")?opts.sigma:PVP_MC_SIGMA;
  var selfF={inf:pvpTypeFactor(self,bs,"inf"),cav:pvpTypeFactor(self,bs,"cav"),arc:pvpTypeFactor(self,bs,"arc")};
  var oppF={inf:pvpTypeFactor(opp,bo,"inf"),cav:pvpTypeFactor(opp,bo,"cav"),arc:pvpTypeFactor(opp,bo,"arc")};
  var s0={inf:parseInt(self.inf_n)||0,cav:parseInt(self.cav_n)||0,arc:parseInt(self.arc_n)||0};
  var o0={inf:parseInt(opp.inf_n)||0,cav:parseInt(opp.cav_n)||0,arc:parseInt(opp.arc_n)||0};
  var totalS=s0.inf+s0.cav+s0.arc,totalO=o0.inf+o0.cav+o0.arc;
  if(totalS<=0||totalO<=0) return null;
  var N0=Math.min(totalS,totalO);

  // 兵種別ティア（メールのLv.X.Y。未指定はT10）→基礎Atk/HPと三すくみ追加ボーナス有無
  function sideTiers(side){
    return {
      inf:pvpTierKey(side.inf_tier),cav:pvpTierKey(side.cav_tier),arc:pvpTierKey(side.arc_tier)
    };
  }
  function sideBases(tiers){
    return {inf:pvpBaseFor("inf",tiers.inf),cav:pvpBaseFor("cav",tiers.cav),arc:pvpBaseFor("arc",tiers.arc)};
  }
  var tiersS=sideTiers(self),tiersO=sideTiers(opp);
  var baseS=sideBases(tiersS),baseO=sideBases(tiersO);

  // 実効攻撃力・実効HP＝ティア別基礎ステータス×プレイヤーのステータス係数
  // attF/defF: pvpTypeFactorのA=(1+atk%)(1+let%)×armyMult、D=(1+def%)(1+hea%)
  // 攻撃側(att)から防御側(def_)への1ステップあたりのダメージ流量（ターゲティングルール反映）
  // T1-6の兵は追加ボーナス（歩の対騎防御・弓の連続攻撃・騎の奇襲）が無く与ダメ+10%のみ（運営回答）
  function flows(att,attF,attBase,attTiers,def_,defF,defBase,defTiers,g){
    var f={inf:0,cav:0,arc:0};
    function dmg(t,u,n,mult){
      return Math.sqrt(Math.max(n,0))*Math.sqrt(N0)
        *(attBase[t].atk*attF[t].A)/(defBase[u].hea*defF[u].D)*mult*g;
    }
    // 弓兵：敵歩兵（前衛）優先。高ティアは二重ボーナス、低ティアは+10%のみ
    if(att.arc>0){
      var aiMult=pvpTierIsHigh(attTiers.arc)?PVP_TRI_AI:1.10;
      if(def_.inf>0) f.inf+=dmg("arc","inf",att.arc,aiMult);
      else if(def_.cav>0) f.cav+=dmg("arc","cav",att.arc,1);
      else if(def_.arc>0) f.arc+=dmg("arc","arc",att.arc,1);
    }
    // 騎兵：敵歩兵が健在なら大半は歩兵へ（高ティア歩兵は対騎防御あり）、高ティア騎兵のみ奇襲で弓兵へ
    if(att.cav>0){
      var bypass=pvpTierIsHigh(attTiers.cav)?PVP_TRI_BYPASS:0;
      var cavInf=pvpTierIsHigh(defTiers.inf)?PVP_CAV_INF:1.0;
      if(def_.inf>0){
        if(def_.arc>0&&bypass>0){
          f.inf+=dmg("cav","inf",att.cav*(1-bypass),cavInf);
          f.arc+=dmg("cav","arc",att.cav,PVP_TRI_WEAK)*bypass;
        } else {
          f.inf+=dmg("cav","inf",att.cav,cavInf);
        }
      } else if(def_.cav>0&&def_.arc>0&&bypass>0){
        f.cav+=dmg("cav","cav",att.cav*(1-bypass),1);
        f.arc+=dmg("cav","arc",att.cav,PVP_TRI_WEAK)*bypass;
      } else if(def_.cav>0){ f.cav+=dmg("cav","cav",att.cav,1); }
      else if(def_.arc>0){ f.arc+=dmg("cav","arc",att.cav,PVP_TRI_WEAK); }
    }
    // 歩兵：敵歩兵（前衛同士、ボーナスなし）優先。不在なら騎兵（高ティアは二重ボーナス）→弓兵
    if(att.inf>0){
      var icMult=pvpTierIsHigh(attTiers.inf)?PVP_TRI_IC:1.10;
      if(def_.inf>0) f.inf+=dmg("inf","inf",att.inf,1);
      else if(def_.cav>0) f.cav+=dmg("inf","cav",att.inf,icMult);
      else if(def_.arc>0) f.arc+=dmg("inf","arc",att.inf,1);
    }
    return f;
  }

  // 適応dt：初期流量から「1ステップ≈総兵力の1.5%減衰」となるよう自動設定
  var f0S=flows(s0,selfF,baseS,tiersS,o0,oppF,baseO,tiersO,1),f0O=flows(o0,oppF,baseO,tiersO,s0,selfF,baseS,tiersS,1);
  var rate=Math.max((f0S.inf+f0S.cav+f0S.arc)/totalO,(f0O.inf+f0O.cav+f0O.arc)/totalS);
  var dt=rate>0?0.015/rate:1;

  // モンテカルロ：陣営実効戦力に対数正規ノイズを与えてPVP_MC_TRIALS回試行し勝率を集計
  var rand=pvpMulberry32(123456789);
  function gauss(){
    var u=Math.max(rand(),1e-9),v=rand();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
  }
  var wins=0,sumRemS=0,sumRemO=0,sumMargin=0;
  for(var tr=0;tr<mcTrials;tr++){
    var gS=Math.exp(gauss()*mcSigma),gO=Math.exp(gauss()*mcSigma);
    var s={inf:s0.inf,cav:s0.cav,arc:s0.arc},o={inf:o0.inf,cav:o0.cav,arc:o0.arc};
    for(var i=0;i<PVP_SIM_STEPS;i++){
      if(s.inf+s.cav+s.arc<=totalS*0.003||o.inf+o.cav+o.arc<=totalO*0.003) break;
      var fS=flows(s,selfF,baseS,tiersS,o,oppF,baseO,tiersO,gS),fO=flows(o,oppF,baseO,tiersO,s,selfF,baseS,tiersS,gO);
      o.inf=Math.max(0,o.inf-fS.inf*dt);o.cav=Math.max(0,o.cav-fS.cav*dt);o.arc=Math.max(0,o.arc-fS.arc*dt);
      s.inf=Math.max(0,s.inf-fO.inf*dt);s.cav=Math.max(0,s.cav-fO.cav*dt);s.arc=Math.max(0,s.arc-fO.arc*dt);
    }
    var remS=s.inf+s.cav+s.arc,remO=o.inf+o.cav+o.arc;
    if(remS/totalS>remO/totalO) wins++;
    sumRemS+=remS;sumRemO+=remO;
    sumMargin+=remS/totalS-remO/totalO;
  }
  var pct=wins/mcTrials*100;
  // margin：平均残存率の差（-1〜+1）。スイープの順位付け用（勝率0/100で飽和しない連続値）
  return {overallPct:pct,remS:sumRemS/mcTrials,remO:sumRemO/mcTrials,margin:sumMargin/mcTrials};
}

function pvpCompare(self,opp,opts){
  var bs=pvpSideBonus(self),bo=pvpSideBonus(opp);
  var rows=[],totalW=0,sumRatioLog=0;
  var totalSelfN=(parseInt(self.inf_n)||0)+(parseInt(self.cav_n)||0)+(parseInt(self.arc_n)||0);
  var totalOppN=(parseInt(opp.inf_n)||0)+(parseInt(opp.cav_n)||0)+(parseInt(opp.arc_n)||0);
  var N0global=Math.min(totalSelfN,totalOppN);
  PVP_TYPES.forEach(function(tp){
    var t=tp.k;
    var Ns=parseInt(self[t+"_n"])||0,No=parseInt(opp[t+"_n"])||0;
    var row={type:tp,Ns:Ns,No:No,ratio:null};
    if(Ns>0&&No>0&&N0global>0){
      var fs=pvpTypeFactor(self,bs,t),fo=pvpTypeFactor(opp,bo,t);
      // ティア差があれば基礎ステ比も反映（同ティアなら1:1で従来通り）
      var tbS=pvpBaseFor(t,pvpTierKey(self[t+"_tier"])),tbO=pvpBaseFor(t,pvpTierKey(opp[t+"_tier"]));
      var killsBySelf=Math.sqrt(Ns)*Math.sqrt(N0global)*(tbS.atk*fs.A)/(tbO.hea*fo.D);
      var killsByOpp=Math.sqrt(No)*Math.sqrt(N0global)*(tbO.atk*fo.A)/(tbS.hea*fs.D);
      row.killsBySelf=killsBySelf;row.killsByOpp=killsByOpp;
      var ratio=killsByOpp>0?killsBySelf/killsByOpp:(killsBySelf>0?99:1);
      row.ratio=ratio;
      var w=Ns+No;
      totalW+=w;sumRatioLog+=Math.log(Math.max(ratio,0.0001))*w;
    }
    rows.push(row);
  });
  var overallRatio=totalW>0?Math.exp(sumRatioLog/totalW):1;
  var basePct=overallRatio/(overallRatio+1)*100; // 三すくみ抜きの素の統計比較（参考表示用）
  var sim=pvpSimulateBattle(self,opp,bs,bo,opts);
  var overallPct=sim?sim.overallPct:basePct;
  var triangleAdj=overallPct-basePct; // 三すくみシミュレーションによって基礎値からどれだけ動いたか（参考表示用）
  return {rows:rows,overallRatio:overallRatio,basePct:basePct,triangleAdj:triangleAdj,overallPct:overallPct,margin:sim?sim.margin:0,selfNotes:bs.notes,oppNotes:bo.notes};
}

function parsePvpStats(txt){
  var km=[
    {f:"inf_atk",keys:["歩兵攻撃力","歩兵攻擊力"]},{f:"inf_def",keys:["歩兵防御力","歩兵防禦力"]},
    {f:"inf_let",keys:["歩兵殺傷力"]},{f:"inf_hea",keys:["歩兵HP","歩兵体力","歩兵耐久力"]},
    {f:"cav_atk",keys:["騎兵攻撃力","騎兵攻擊力"]},{f:"cav_def",keys:["騎兵防御力","騎兵防禦力"]},
    {f:"cav_let",keys:["騎兵殺傷力"]},{f:"cav_hea",keys:["騎兵HP","騎兵体力","騎兵耐久力"]},
    {f:"arc_atk",keys:["弓兵攻撃力","弓兵攻擊力"]},{f:"arc_def",keys:["弓兵防御力","弓兵防禦力"]},
    {f:"arc_let",keys:["弓兵殺傷力"]},{f:"arc_hea",keys:["弓兵HP","弓兵体力","弓兵耐久力"]}
  ];
  // ゲーム内メール「ボーナス詳細」のOCR結果には2種類の並びがある：
  //  (A) interleaved: [自分の値]→[ラベル]→[相手の値] の3行1組
  //  (B) block: [自分の12値がまとめて]→[12ラベルがまとめて]→[相手の12値がまとめて]
  // どちらでも読めるよう、まずラベルが連続ブロックかを判定して分岐する。
  var STAT_ORDER=km.map(function(x){return x.f;});
  var lines=(txt||"").split(/[\n\r]+/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var self={},opp={};
  function isPct(l){return /^[+\-]?\d+(\.\d+)?%$/.test(l);}
  function pctVal(l){var m=l.match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}
  // 各ラベルの最初の出現行を求める
  var labelIdxs=[];
  km.forEach(function(item){
    for(var li=0;li<lines.length;li++){
      if(item.keys.some(function(k){return lines[li].indexOf(k)!==-1;})){labelIdxs.push(li);break;}
    }
  });
  var firstLabel=labelIdxs.length?Math.min.apply(null,labelIdxs):-1;
  var lastLabel=labelIdxs.length?Math.max.apply(null,labelIdxs):-1;
  // ラベル区間内に%値がなければブロック構造とみなす
  var pctBetween=0;
  if(firstLabel>=0){for(var pb=firstLabel+1;pb<lastLabel;pb++){if(isPct(lines[pb]))pctBetween++;}}
  var blockLayout=(labelIdxs.length>=8 && pctBetween===0);
  if(blockLayout){
    var before=[];for(var s2=firstLabel-1;s2>=0;s2--){if(isPct(lines[s2]))before.unshift(pctVal(lines[s2]));}
    var after=[];for(var a2=lastLabel+1;a2<lines.length;a2++){if(isPct(lines[a2]))after.push(pctVal(lines[a2]));}
    var selfVals=before.slice(-12),oppVals=after.slice(0,12);
    for(var oi=0;oi<STAT_ORDER.length;oi++){
      if(selfVals.length>=12 && selfVals[oi]!=null) self[STAT_ORDER[oi]]=selfVals[oi];
      if(oppVals.length>=12 && oppVals[oi]!=null) opp[STAT_ORDER[oi]]=oppVals[oi];
    }
  } else {
    for(var i=0;i<lines.length;i++){
      var line=lines[i];
      km.forEach(function(item){
        var hit=item.keys.some(function(k){return line.indexOf(k)!==-1;});
        if(!hit) return;
        if(i>0){
          var m1=lines[i-1].match(/-?\d+\.?\d*/);
          if(m1) self[item.f]=parseFloat(m1[0]);
        }
        if(i+1<lines.length){
          var m2=lines[i+1].match(/-?\d+\.?\d*/);
          if(m2) opp[item.f]=parseFloat(m2[0]);
        }
      });
    }
  }
  var foundSelf=Object.keys(self).length,foundOpp=Object.keys(opp).length;
  // 兵力（部隊人数）の読み取り：カンマ区切りの人数が
  // 自分(歩兵→騎兵→弓兵)・相手(歩兵→騎兵→弓兵)の順で計6個並んでいる。
  // ブロック構造ではラベルの前後に兵数が分散するため、全文から
  // 3桁カンマ区切りの数値（メールIDなど桁の多い無区切り数値は除外）を上から拾う。
  var troopNums=[];
  for(var j=0;j<lines.length;j++){
    if(/^\d{1,3}(,\d{3})+$/.test(lines[j])) troopNums.push(parseInt(lines[j].replace(/,/g,""),10));
  }
  // 兵士レベル（ティア）の読み取り：兵数アイコンの「Lv.10.0」等（小数部＝真金強化レベル）。
  // OCRのゆらぎ（'Lv.10.0 / Lv.10.0- / NLv.10.0 など前後のノイズ）を許容し、
  // 全文から兵数と同じ順（自分 歩→騎→弓、相手 歩→騎→弓）で最大6個拾う。
  var tierVals=[];
  for(var j2=0;j2<lines.length;j2++){
    var lm=lines[j2].match(/Lv\.?\s*(\d{1,2}(?:\.\d)?)/i);
    if(lm) tierVals.push(lm[1]);
  }
  var foundTier=0;
  if(tierVals.length>=6){
    // "10.0"→"10" のように既知ティアキーへ正規化してから格納（UIのselect値と一致させる）
    self.inf_tier=pvpTierKey(tierVals[0]);self.cav_tier=pvpTierKey(tierVals[1]);self.arc_tier=pvpTierKey(tierVals[2]);
    opp.inf_tier=pvpTierKey(tierVals[3]);opp.cav_tier=pvpTierKey(tierVals[4]);opp.arc_tier=pvpTierKey(tierVals[5]);
    foundTier=6;
  }
  var foundTroop=0;
  if(troopNums.length>=6){
    self.inf_n=String(troopNums[0]);self.cav_n=String(troopNums[1]);self.arc_n=String(troopNums[2]);
    opp.inf_n=String(troopNums[3]);opp.cav_n=String(troopNums[4]);opp.arc_n=String(troopNums[5]);
    foundTroop=6;
  }
  return {self:self,opp:opp,foundSelf:foundSelf,foundOpp:foundOpp,foundTroop:foundTroop,foundTier:foundTier};
}

// 自分側の兵力総数を固定し、歩兵/騎兵/弓兵の配分（5%刻み）を総当たりして
// 最も有利度が高くなる構成を探す（本家Frakinatorの「composition sweep」に相当する簡易版）。
function pvpSweepOptimal(self,opp,total){
  if(!total||total<=0) return null;
  var best=null;
  for(var i=0;i<=20;i++){
    var fInf=i*0.05;
    for(var j=0;j<=20-i;j++){
      var fCav=j*0.05;
      var fArc=Math.max(0,1-fInf-fCav);
      var cand=Object.assign({},self,{
        inf_n:String(Math.round(total*fInf)),
        cav_n:String(Math.round(total*fCav)),
        arc_n:String(Math.round(total*fArc))
      });
      // 軽量モード（決定論的1回試行）でmargin＝平均残存率差により順位付け
      var r=pvpCompare(cand,opp,{trials:1,sigma:0});
      if(!best||r.margin>best.margin){
        best={margin:r.margin,fInf:fInf,fCav:fCav,fArc:fArc};
      }
    }
  }
  if(best){
    // 最良構成のみフル精度（600試行MC）で勝率を算出
    var bc=Object.assign({},self,{
      inf_n:String(Math.round(total*best.fInf)),
      cav_n:String(Math.round(total*best.fCav)),
      arc_n:String(Math.round(total*best.fArc))
    });
    best.pct=pvpCompare(bc,opp).overallPct;
  }
  return best;
}

// ===== 英雄見直し提案 =====
// 各枠（ホスト3＋ジョイナー4）について、数値が確定している英雄を総当たりでシミュレーションし、
// 現在より有利になる入れ替えを提案する。数値未検証の英雄（確率発動スキル等）は効果0として
// 扱われてしまい「外せ」という誤った提案になり得るため、現在セットされている英雄が
// 未検証の場合はその枠の提案をスキップして注記のみ出す。
var PVP_MODELED={
  heroInf:["charles","amadeus","eric","longfei","howard","zoe","helga","triton"],
  heroCav:["aiva","chenko","margot","fahd","gordon","hilde","jabel"],
  heroArc:["renron","amane","yeonwoo","vivian","quinn","jaeger","saul"],
  joiner:["charles","aiva","renron","chenko","amane","yeonwoo","margot","amadeus","gordon","hilde","saul","howard","quinn","fahd","eric","triton"]
};
function pvpHeroAdvice(self,opp){
  function marginOf(s){var r=pvpCompare(s,opp,{trials:1,sigma:0});return r.margin;}
  var slots=[
    {key:"heroInf",list:PVP_HERO_INF,modeled:PVP_MODELED.heroInf,label:"🛡️ 歩兵ホスト"},
    {key:"heroCav",list:PVP_HERO_CAV,modeled:PVP_MODELED.heroCav,label:"🐎 騎兵ホスト"},
    {key:"heroArc",list:PVP_HERO_ARC,modeled:PVP_MODELED.heroArc,label:"🏹 弓兵ホスト"},
    {key:"j1",list:PVP_HERO_JOINER,modeled:PVP_MODELED.joiner,label:"ジョイナー1"},
    {key:"j2",list:PVP_HERO_JOINER,modeled:PVP_MODELED.joiner,label:"ジョイナー2"},
    {key:"j3",list:PVP_HERO_JOINER,modeled:PVP_MODELED.joiner,label:"ジョイナー3"},
    {key:"j4",list:PVP_HERO_JOINER,modeled:PVP_MODELED.joiner,label:"ジョイナー4"}
  ];
  var baseMargin=marginOf(self);
  var suggestions=[],skipped=[],bestSelf=Object.assign({},self),anyChange=false;
  slots.forEach(function(slot){
    var cur=self[slot.key]||"none";
    // 現在の英雄が「選択済みだが数値未検証」なら提案しない（外す提案は誤りになるため）
    if(cur!=="none"&&slot.modeled.indexOf(cur)===-1){
      skipped.push(slot.label+"（"+pvpHeroLabel(slot.list,cur)+"は数値未検証のため比較不可）");
      return;
    }
    var best=null;
    slot.modeled.forEach(function(v){
      if(v===cur) return;
      var cand=Object.assign({},bestSelf);cand[slot.key]=v;
      var m=marginOf(cand);
      if(!best||m>best.m) best={v:v,m:m};
    });
    var curMargin=marginOf(bestSelf);
    if(best&&best.m>curMargin+0.003){
      suggestions.push({label:slot.label,from:cur==="none"?"なし":pvpHeroLabel(slot.list,cur),to:pvpHeroLabel(slot.list,best.v),key:slot.key});
      bestSelf[slot.key]=best.v;
      anyChange=true;
    }
  });
  var curPct=pvpCompare(self,opp,{trials:400}).overallPct;
  var bestPct=anyChange?pvpCompare(bestSelf,opp,{trials:400}).overallPct:curPct;
  return {suggestions:suggestions,skipped:skipped,curPct:curPct,bestPct:bestPct};
}

// ===== 勝率アップの目安（感度分析） =====
// 攻/防/殺/HP（+pt、3兵種一律＝研究・装備強化のイメージ）と兵力（+%、構成比維持）を
// 段階的に増やしてシミュレーションし、目標勝率（現在<50%なら50%、50〜80%なら80%）に
// 届く最小の増分を探す。計算コストがあるためボタン押下時のみ実行。
function pvpStatAdvice(self,opp){
  var cur=pvpCompare(self,opp,{trials:400}).overallPct;
  var target=cur<50?50:(cur<80?80:null);
  var rows=[];
  function applyLever(base,key,amount){
    var s=Object.assign({},base);
    if(key==="troops"){
      ["inf","cav","arc"].forEach(function(t){s[t+"_n"]=String(Math.round((parseInt(base[t+"_n"])||0)*(1+amount/100)));});
    } else {
      ["inf","cav","arc"].forEach(function(t){var k=t+"_"+key;s[k]=String((parseFloat(base[k])||0)+amount);});
    }
    return s;
  }
  if(target!==null){
    var levers=[
      {key:"atk",label:"攻撃力",unit:"pt",ladder:[10,25,50,75,100,150,200,300]},
      {key:"def",label:"防御力",unit:"pt",ladder:[10,25,50,75,100,150,200,300]},
      {key:"let",label:"殺傷力",unit:"pt",ladder:[10,25,50,75,100,150,200,300]},
      {key:"hea",label:"HP",unit:"pt",ladder:[10,25,50,75,100,150,200,300]},
      {key:"troops",label:"兵力",unit:"%",ladder:[5,10,20,30,50,75,100]}
    ];
    levers.forEach(function(lv){
      var found=null,foundPct=null,lastPct=null;
      for(var i=0;i<lv.ladder.length;i++){
        var pct=pvpCompare(applyLever(self,lv.key,lv.ladder[i]),opp,{trials:200}).overallPct;
        lastPct=pct;
        if(pct>=target){found=lv.ladder[i];foundPct=pct;break;}
      }
      rows.push({label:lv.label,unit:lv.unit,found:found,pct:found!=null?foundPct:lastPct,maxTried:lv.ladder[lv.ladder.length-1]});
    });
  }
  return {cur:cur,target:target,rows:rows};
}
